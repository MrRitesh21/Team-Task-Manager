[build]
builder = "nixpacks"

[[services]]
name = "server"
source = "server"
startCommand = "node server.js"

[services.server.env]
PORT = "8080"

[[services]]
name = "client"
source = "client"
buildCommand = "npm run build"
startCommand = "npm run preview -- --host 0.0.0.0 --port 3000"

[services.client.env]
PORT = "3000"
